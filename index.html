<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Something Big is Coming</title>
    <style>
        /* CSS Styles */
        :root {
            --bg-color: #0f172a;
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            padding: 2rem;
            max-width: 600px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            color: var(--accent-color);
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        p {
            color: var(--text-dim);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 3rem;
        }

        /* Countdown Styles */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .time-box {
            display: flex;
            flex-direction: column;
        }

        .time-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .time-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--accent-color);
            letter-spacing: 0.1em;
        }

        /* Form Styles */
        .email-form {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
        }

        input[type="email"] {
            padding: 0.8rem 1.2rem;
            border-radius: 8px;
            border: 1px solid #1e293b;
            background: #1e293b;
            color: white;
            width: 250px;
            outline: none;
        }

        input[type="email"]:focus {
            border-color: var(--accent-color);
        }

        button {
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            border: none;
            background-color: var(--accent-color);
            color: #0f172a;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            .email-form { flex-direction: column; }
            input[type="email"] { width: 100%; box-sizing: border-box; }
            .countdown { gap: 0.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">BrandName</div>
        <h1>We're launching soon.</h1>
        <p>We're busy building something amazing. Join our waitlist to get notified when we go live and receive an exclusive early-bird discount.</p>

        <div class="countdown">
            <div class="time-box">
                <span class="time-value" id="days">00</span>
                <span class="time-label">Days</span>
            </div>
            <div class="time-box">
                <span class="time-value" id="hours">00</span>
                <span class="time-label">Hrs</span>
            </div>
            <div class="time-box">
                <span class="time-value" id="minutes">00</span>
                <span class="time-label">Min</span>
            </div>
            <div class="time-box">
                <span class="time-value" id="seconds">00</span>
                <span class="time-label">Sec</span>
            </div>
        </div>

        <form class="email-form" action="#" method="POST">
            <input type="email" placeholder="Enter your email" required>
            <button type="submit">Notify Me</button>
        </form>
    </div>

    <script>
        // Set the date we're counting down to (Example: 30 days from now)
        const countdownDate = new Date();
        countdownDate.setDate(countdownDate.getDate() + 30);

        const updateCountdown = () => {
            const now = new Date().getTime();
            const distance = countdownDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerHTML = days.toString().padStart(2, '0');
            document.getElementById("hours").innerHTML = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerHTML = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerHTML = seconds.toString().padStart(2, '0');

            if (distance < 0) {
                clearInterval(interval);
                document.querySelector(".countdown").innerHTML = "WE ARE LIVE!";
            }
        };

        const interval = setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>

</body>
</html>
